<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Orbit Striker — FreshPlay Arcade</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				background: #c4e2f5;
				overflow: hidden;
				touch-action: none;
				user-select: none;
				-webkit-user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			canvas {
				display: block;
				touch-action: none;
				outline: none;
			}

			/* Loading Screen */
			#loading-screen {
				position: fixed;
				inset: 0;
				background: #c4e2f5;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				z-index: 9999;
				font-family: 'Courier New', Courier, monospace;
				gap: 0;
				transition: opacity 0.6s ease;
			}

			#loading-screen.hidden {
				opacity: 0;
				pointer-events: none;
			}

			/* Animated orbit ring */
			.orbit-loader {
				position: relative;
				width: 120px;
				height: 120px;
				margin-bottom: 36px;
			}

			.orbit-core {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 28px;
				height: 28px;
				border-radius: 50%;
				border: 2px solid #00e5ff;
				box-shadow: 0 0 18px rgba(0, 229, 255, 0.7), inset 0 0 8px rgba(0, 229, 255, 0.3);
			}

			.orbit-ring {
				position: absolute;
				inset: 0;
				border-radius: 50%;
				border: 1px solid rgba(0, 229, 255, 0.15);
			}

			.orbit-dot-a {
				position: absolute;
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: #00e5ff;
				box-shadow: 0 0 12px #00e5ff;
				top: 50%;
				left: 50%;
				margin: -5px 0 0 -5px;
				transform-origin: 0 0;
				animation: orbitA 1.2s linear infinite;
			}

			.orbit-dot-b {
				position: absolute;
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: #ff6600;
				box-shadow: 0 0 12px #ff6600;
				top: 50%;
				left: 50%;
				margin: -5px 0 0 -5px;
				transform-origin: 0 0;
				animation: orbitB 1.2s linear infinite;
			}

			@keyframes orbitA {
				0% {
					transform: rotate(0deg) translateX(50px);
				}

				100% {
					transform: rotate(360deg) translateX(50px);
				}
			}

			@keyframes orbitB {
				0% {
					transform: rotate(180deg) translateX(50px);
				}

				100% {
					transform: rotate(540deg) translateX(50px);
				}
			}

			/* Shield arc decorations */
			.orbit-arc {
				position: absolute;
				inset: 8px;
				border-radius: 50%;
				border: 2px solid transparent;
				border-top-color: #00e5ff;
				border-bottom-color: #ff6600;
				animation: arcSpin 1.8s linear infinite;
				opacity: 0.6;
			}

			@keyframes arcSpin {
				0% {
					transform: rotate(0deg);
				}

				100% {
					transform: rotate(360deg);
				}
			}

			/* Branding */
			.load-brand {
				font-size: 11px;
				font-weight: bold;
				letter-spacing: 0.5em;
				color: rgba(255, 255, 255, 0.3);
				text-transform: uppercase;
				margin-bottom: 10px;
			}

			.load-title {
				font-size: 26px;
				font-weight: bold;
				letter-spacing: 0.25em;
				color: #ffffff;
				text-transform: uppercase;
				text-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
				margin-bottom: 4px;
				animation: titlePulse 2s ease-in-out infinite alternate;
			}

			.load-sub {
				font-size: 10px;
				color: rgba(0, 229, 255, 0.4);
				letter-spacing: 0.4em;
				text-transform: uppercase;
				margin-bottom: 36px;
			}

			/* Progress bar */
			.load-bar-wrap {
				width: 180px;
				height: 2px;
				background: rgba(0, 229, 255, 0.1);
				position: relative;
				overflow: hidden;
				margin-bottom: 16px;
			}

			.load-bar-fill {
				height: 100%;
				background: linear-gradient(90deg, #00e5ff, #ffffff);
				box-shadow: 0 0 8px #48d1cc;
				animation: barSweep 1.4s ease-in-out infinite;
			}

			.load-status {
				font-size: 9px;
				color: rgba(255, 255, 255, 0.25);
				letter-spacing: 0.3em;
				text-transform: uppercase;
			}

			@keyframes barSweep {
				0% {
					width: 0%;
					margin-left: 0;
				}

				50% {
					width: 70%;
				}

				100% {
					width: 0%;
					margin-left: 100%;
				}
			}

			@keyframes titlePulse {
				from {
					text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
				}

				to {
					text-shadow: 0 0 50px rgba(0, 229, 255, 0.9), 0 0 100px rgba(0, 229, 255, 0.2);
				}
			}

			/* Touch hint */
			#touch-hint {
				position: fixed;
				bottom: 70px;
				left: 50%;
				transform: translateX(-50%);
				font-family: 'Courier New', monospace;
				font-size: 9px;
				color: rgba(255, 255, 255, 0.2);
				letter-spacing: 0.4em;
				text-transform: uppercase;
				pointer-events: none;
				white-space: nowrap;
				animation: hintFade 4s ease 2.5s forwards;
				z-index: 60;
			}

			@keyframes hintFade {
				0% {
					opacity: 1;
				}

				100% {
					opacity: 0;
				}
			}

			/* Scanline overlay */
			#scanlines {
				position: fixed;
				inset: 0;
				background: repeating-linear-gradient(0deg,
						transparent,
						transparent 2px,
						rgba(0, 0, 0, 0.06) 2px,
						rgba(0, 0, 0, 0.06) 4px);
				pointer-events: none;
				z-index: 5;
			}
		</style>
	</head>

	<body>
		<!-- Subtle scanline overlay -->
		<div id="scanlines"></div>

		<!-- Loading screen -->
		<div id="loading-screen">
			<div class="orbit-loader">
				<div class="orbit-ring"></div>
				<div class="orbit-arc"></div>
				<div class="orbit-core"></div>
				<div class="orbit-dot-a"></div>
				<div class="orbit-dot-b"></div>
			</div>

			<div class="load-brand">FreshPlay Arcade</div>
			<div class="load-title">Orbit Striker</div>
			<div class="load-sub">Match · Deflect · Survive</div>

			<div class="load-bar-wrap">
				<div class="load-bar-fill"></div>
			</div>
			<div class="load-status">Initializing core systems...</div>
		</div>

		<!-- Touch hint (mobile) -->
		<div id="touch-hint">TAP LEFT / RIGHT TO ROTATE</div>

		<!-- Phaser 3 -->
		<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

		<!-- FreshPlay SDK fallback -->
		<script>
			window.FreshPlay = {
				currentLevel: 1,
				palettes: [
					{ background: 0x000a14, playerCore: 0x00e5ff, fxAccent: 0xff6600, interface: 0x00234f, hostile: 0xff0044 },
					{ background: 0x1a0a1a, playerCore: 0x00e5ff, fxAccent: 0xff00ff, interface: 0x00234f, hostile: 0xffaa00 },
					{ background: 0x101a0f, playerCore: 0xffaa00, fxAccent: 0xaa00ff, interface: 0x00234f, hostile: 0x00ff00 },
					{ background: 0x0a1526, playerCore: 0xff00ff, fxAccent: 0x00ffff, interface: 0x00234f, hostile: 0xffaa00 },
					{ background: 0x1a0505, playerCore: 0x00234f, fxAccent: 0xff5500, interface: 0xa1a1aa, hostile: 0xff0000 },
					{ background: 0x000a14, playerCore: 0x00ffcc, fxAccent: 0xff3366, interface: 0x00234f, hostile: 0x3366ff },
					{ background: 0x1a1300, playerCore: 0xffd700, fxAccent: 0xcc00ff, interface: 0x00234f, hostile: 0x00234f },
					{ background: 0x000000, playerCore: 0x00234f, fxAccent: 0xff0000, interface: 0x00ff00, hostile: 0x333333 },
				],
				getCurrentPalette() {
					const idx = Math.floor((this.currentLevel - 1) / 5) % this.palettes.length;
					return this.palettes[idx];
				},
				levelComplete(cb) {
					this.currentLevel++;
					if (typeof cb === 'function') cb();
				},
				gameOver(score) {
					console.log('[FreshPlay SDK] Game Over. Score:', score);
				}
			};
		</script>

		<!-- Attempt to load the real SDK if on portal -->
		<script src="../../assets/js/fp-sdk.js"
			onerror="console.warn('[FreshPlay] Standalone mode — using inline SDK.')"></script>

		<!-- Game -->
		<script src="game.js"></script>

		<script>
			window.addEventListener('load', () => {
				setTimeout(() => {
					const ls = document.getElementById('loading-screen');
					if (ls) {
						ls.classList.add('hidden');
						setTimeout(() => ls.remove(), 700);
					}
				}, 1000);
			});
		</script>
	</body>
</html>
