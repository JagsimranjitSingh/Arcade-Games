<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<title>MERGE WEAPONS — LUXURY EDITION</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />

		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #060612;
				--gold: #f0c040;
				--teal: #00f5cc;
				--hostile: #ff2055;
				--purple: #cc44ff;
				--silver: #ccd8ff;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				background: var(--bg);
				overflow: hidden;
				font-family: 'Share Tech Mono', monospace;
			}

			/* Animated luxury grid */
			body::before {
				content: '';
				position: fixed;
				inset: 0;
				z-index: 0;
				background-image:
					linear-gradient(rgba(240, 192, 64, 0.028) 1px, transparent 1px),
					linear-gradient(90deg, rgba(240, 192, 64, 0.028) 1px, transparent 1px);
				background-size: 50px 50px;
				animation: gridDrift 32s linear infinite;
			}

			@keyframes gridDrift {
				from {
					background-position: 0 0;
				}

				to {
					background-position: 50px 50px;
				}
			}

			/* Rich ambient glows */
			body::after {
				content: '';
				position: fixed;
				inset: 0;
				z-index: 0;
				background:
					radial-gradient(ellipse 55% 38% at 12% 8%, rgba(0, 245, 204, 0.07) 0%, transparent 70%),
					radial-gradient(ellipse 45% 32% at 88% 92%, rgba(255, 32, 85, 0.06) 0%, transparent 70%),
					radial-gradient(ellipse 38% 28% at 50% 50%, rgba(240, 192, 64, 0.04) 0%, transparent 70%);
				pointer-events: none;
			}

			/* CRT scanlines */
			.scanlines {
				position: fixed;
				inset: 0;
				z-index: 100;
				background: repeating-linear-gradient(0deg, transparent, transparent 2px,
						rgba(0, 0, 0, 0.055) 2px, rgba(0, 0, 0, 0.055) 4px);
				pointer-events: none;
			}

			/* Shell */
			#shell {
				position: relative;
				z-index: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				padding: 6px 0;
				gap: 6px;
			}

			/* Header — full width */
			header {
				width: 100%;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 20px 2px;
			}

			.logo {
				font-family: 'Orbitron', sans-serif;
				font-weight: 900;
				font-size: clamp(13px, 2vw, 20px);
				letter-spacing: 0.22em;
				color: var(--teal);
				text-shadow: 0 0 14px var(--teal), 0 0 36px rgba(0, 245, 204, 0.3);
				animation: logoPulse 3.5s ease-in-out infinite;
			}

			.logo span {
				color: var(--gold);
				text-shadow: 0 0 14px var(--gold), 0 0 36px rgba(240, 192, 64, 0.35);
			}

			@keyframes logoPulse {
				0%,
				100% {
					opacity: 1;
				}

				50% {
					opacity: 0.85;
				}
			}

			.badge-row {
				display: flex;
				gap: 10px;
				align-items: center;
			}

			.badge {
				font-size: 9px;
				letter-spacing: 0.14em;
				color: var(--gold);
				opacity: 0.32;
				border: 1px solid rgba(240, 192, 64, 0.22);
				padding: 3px 10px;
				border-radius: 2px;
			}

			/* Game wrapper — FULL WIDTH */
			#game-wrap {
				position: relative;
				width: 100%;
				max-width: 1260px;
			}

			/* Luxury corner brackets */
			.corner {
				position: absolute;
				width: 28px;
				height: 28px;
				border-color: var(--gold);
				border-style: solid;
				opacity: 0.45;
				z-index: 2;
				pointer-events: none;
			}

			.corner.tl {
				top: -3px;
				left: -3px;
				border-width: 2px 0 0 2px;
			}

			.corner.tr {
				top: -3px;
				right: -3px;
				border-width: 2px 2px 0 0;
			}

			.corner.bl {
				bottom: -3px;
				left: -3px;
				border-width: 0 0 2px 2px;
			}

			.corner.br {
				bottom: -3px;
				right: -3px;
				border-width: 0 2px 2px 0;
			}

			/* Glow border */
			#game-frame {
				position: absolute;
				inset: -1px;
				border: 1px solid rgba(240, 192, 64, 0.2);
				box-shadow:
					0 0 50px rgba(240, 192, 64, 0.07),
					0 0 100px rgba(0, 245, 204, 0.04),
					inset 0 0 50px rgba(0, 0, 0, 0.6);
				pointer-events: none;
				z-index: 2;
			}

			/* Game container — 1100 × 760 aspect ratio */
			#game-container {
				display: block;
				position: relative;
				overflow: hidden;
			}

			#game-container canvas {
				display: block !important;
				width: 100% !important;
				height: 100% !important;
				margin: 0 !important;
				position: static !important;
			}

			/* Loader */
			#loader {
				position: absolute;
				inset: 0;
				background: var(--bg);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 22px;
				z-index: 10;
				transition: opacity 0.9s ease;
			}

			#loader.hidden {
				opacity: 0;
				pointer-events: none;
			}

			.loader-title {
				font-family: 'Orbitron', sans-serif;
				font-weight: 900;
				font-size: clamp(26px, 4.5vw, 44px);
				letter-spacing: 0.24em;
				color: var(--teal);
				text-shadow: 0 0 24px var(--teal);
				text-align: center;
				line-height: 1.15;
			}

			.loader-title em {
				display: block;
				font-style: normal;
				font-size: 0.58em;
				letter-spacing: 0.34em;
				color: var(--gold);
				text-shadow: 0 0 20px var(--gold);
				margin-top: 4px;
			}

			.loader-sub {
				font-size: 10px;
				letter-spacing: 0.32em;
				color: var(--silver);
				opacity: 0.38;
			}

			.loader-bar-wrap {
				width: 220px;
				height: 2px;
				background: rgba(240, 192, 64, 0.1);
				border-radius: 2px;
				overflow: hidden;
			}

			.loader-bar {
				height: 100%;
				width: 0%;
				background: linear-gradient(90deg, var(--teal), var(--gold));
				box-shadow: 0 0 12px var(--gold);
				animation: barFill 2s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.4s;
			}

			@keyframes barFill {
				0% {
					width: 0%;
					opacity: 1;
				}

				85% {
					width: 100%;
					opacity: 1;
				}

				100% {
					width: 100%;
					opacity: 0;
				}
			}

			/* Footer */
			footer {
				margin-top: 4px;
				display: flex;
				align-items: center;
				gap: 18px;
				opacity: 0.2;
			}

			footer span {
				font-size: 9px;
				letter-spacing: 0.18em;
				color: var(--gold);
			}

			footer .sep {
				width: 1px;
				height: 9px;
				background: var(--gold);
				opacity: 0.35;
			}

			/* Responsive */
			@media (max-height: 580px) {

				header,
				footer {
					display: none;
				}
			}
		</style>
	</head>

	<body>
		<div class="scanlines"></div>

		<div id="shell">

			<header>
				<div class="logo">MERGE <span>WEAPONS</span></div>
				<div class="badge-row">
					<div class="badge">LUXURY EDITION</div>
					<div class="badge">v2.0 · STRATEGY</div>
				</div>
			</header>

			<div id="game-wrap">
				<div class="corner tl"></div>
				<div class="corner tr"></div>
				<div class="corner bl"></div>
				<div class="corner br"></div>
				<div id="game-frame"></div>

				<div id="game-container" class="w-full aspect-[12/12] md:aspect-[16/9]">
					<div id="loader">
						<div class="loader-title">MERGE<em>WEAPONS</em></div>
						<div class="loader-sub">INITIALISING COMBAT SYSTEMS</div>
						<div class="loader-bar-wrap">
							<div class="loader-bar"></div>
						</div>
					</div>
				</div>
			</div>

			<footer>
				<span>MERGE · UPGRADE · CONQUER</span>
				<div class="sep"></div>
				<span>PHASER 3.60</span>
				<div class="sep"></div>
				<span>DRAG TO MERGE</span>
			</footer>

		</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
		<script src="game.js"></script>

		<script>
			(function () {
				var loader = document.getElementById('loader');
				var container = document.getElementById('game-container');
				var observer = new MutationObserver(function () {
					var canvas = container.querySelector('canvas');
					if (canvas) {
						setTimeout(function () { loader.classList.add('hidden'); }, 1000);
						observer.disconnect();
					}
				});
				observer.observe(container, { childList: true, subtree: true });
				setTimeout(function () { loader.classList.add('hidden'); }, 5500);
			})();
		</script>
	</body>
</html>
