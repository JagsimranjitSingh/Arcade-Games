<!DOCTYPE html>
<html lang="en">
	<head>

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>Hexa Merge — FreshPlay Arcade</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background: #c4e2f5;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				font-family: 'Courier New', Courier, monospace;
				overflow: hidden;
				touch-action: none;
				-webkit-tap-highlight-color: transparent;
			}

			#game-container canvas {
				display: block;
				border-radius: 16px;
				box-shadow:
					0 0 0 1px rgba(0, 240, 192, 0.12),
					0 0 40px rgba(0, 240, 192, 0.08),
					0 24px 80px rgba(0, 0, 0, 0.7);
			}
		</style>
	</head>

	<body>
		<div id="game-container"></div>

		<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
		<script src="../../assets/js/fp-sdk.js" onerror="console.info('[FreshPlay] Local environment detected. Using fallback SDK.')"></script>
		<script src="game.js"></script>
	</body>

</html>
