<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<title>Space Scavenger</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #c4e2f5;
				display: flex;
				align-items: center;
				justify-content: center;
				font-family: 'Courier New', monospace;
			}

			#phaser-container canvas {
				display: block;
				margin-left: 0px !important;
			}

			canvas {
				display: block;
				margin-left: 0px !important;
			}
		</style>
	</head>

	<body>
		<div id="phaser-container"></div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

		<script>
			window.FreshPlay = {
				levelComplete(cb) {
					console.log('%c[FreshPlay] levelComplete', 'color:#00ffd0;font-weight:bold');
					if (typeof cb === 'function') cb();
				},
				gameOver(score) {
					console.log('%c[FreshPlay] gameOver — score: ' + score, 'color:#ff4757;font-weight:bold');
				},
				getCurrentPalette() {
					return {
						background: '#f8fafc',
						playerCore: '#7ee8fa',
						fxAccent: '#00ffd0',
						hostile: '#ff4757',
						interface: '#e2e8f0',
					};
				},
			};
		</script>

		<script src="game.js"></script>
	</body>
</html>
