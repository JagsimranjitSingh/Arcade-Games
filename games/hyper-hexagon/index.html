<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>Hyper Hexagon — FreshPlay Arcade</title>
		<style>
			/* Pure CSS Reset and Layout - No CDN Warnings */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				background: #c4e2f5;
				overflow: hidden;
				touch-action: none;
				user-select: none;
				-webkit-user-select: none;
				-webkit-tap-highlight-color: transparent;
			}

			canvas {
				display: block;
				touch-action: none;
				outline: none;
			}

			/* Loading Screen Aesthetics */
			#loading-screen {
				position: fixed;
				inset: 0;
				background: #c4e2f5;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				z-index: 9999;
				font-family: 'Courier New', Courier, monospace;
				gap: 24px;
				transition: opacity 0.5s ease;
			}

			#loading-screen.hidden {
				opacity: 0;
				pointer-events: none;
			}

			.load-logo {
				font-size: 26px;
				font-weight: bold;
				letter-spacing: 0.3em;
				color: #00234f;
				text-transform: uppercase;
				text-shadow: 0 2px 12px rgba(0, 35, 79, 0.3);
				animation: pulse-glow 1.2s ease-in-out infinite alternate;
			}

			.load-sub {
				font-size: 11px;
				color: #555;
				letter-spacing: 0.4em;
				text-transform: uppercase;
			}

			.load-bar-track {
				width: 220px;
				height: 2px;
				background: #b0d4ea;
				position: relative;
				overflow: hidden;
			}

			.load-bar-fill {
				height: 100%;
				background: #48d1cc;
				box-shadow: 0 0 8px #48d1cc;
				animation: load-sweep 1.2s ease-in-out infinite;
			}

			@keyframes load-sweep {
				0% {
					width: 0%;
					margin-left: 0;
				}

				50% {
					width: 60%;
				}

				100% {
					width: 0%;
					margin-left: 100%;
				}
			}

			@keyframes pulse-glow {
				from {
					text-shadow: 0 0 10px rgba(255, 0, 68, 0.5);
				}

				to {
					text-shadow: 0 0 25px rgba(255, 0, 68, 1), 0 0 50px rgba(255, 0, 68, 0.4);
				}
			}

			/* Mobile touch hint */
			#touch-hint {
				position: fixed;
				bottom: 60px;
				left: 50%;
				transform: translateX(-50%);
				font-family: 'Courier New', monospace;
				font-size: 11px;
				color: #555;
				letter-spacing: 0.3em;
				text-transform: uppercase;
				pointer-events: none;
				animation: hint-fade 3s ease 2s forwards;
				z-index: 50;
			}

			@keyframes hint-fade {
				0% {
					opacity: 1;
				}

				100% {
					opacity: 0;
				}
			}
		</style>
	</head>

	<body>
		<div id="loading-screen">
			<div class="load-logo">Hyper Hexagon</div>
			<div class="load-bar-track">
				<div class="load-bar-fill"></div>
			</div>
			<div class="load-sub">Constructing geometry...</div>
		</div>

		<div id="touch-hint">TAP SIDES OR A/D TO ROTATE</div>

		<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

		<script>
			window.FreshPlay = {
				currentLevel: 1,
				levelComplete: function (cb) {
					this.currentLevel++;
					console.log('[FreshPlay] Level Up! Current Level:', this.currentLevel);
					if (cb) cb();
				},
				gameOver: function (score) {
					console.log('[FreshPlay] Game Over. Final Score:', score);
				},
				getCurrentPalette: function () {
					const palettes = [
						{ background: 0x050508, playerCore: 0x00e5ff, fxAccent: 0xff00ff, interface: 0x00234f, hostile: 0xff0044 },
						{ background: 0x080500, playerCore: 0xffaa00, fxAccent: 0x00ff88, interface: 0x00234f, hostile: 0xff00ff },
						{ background: 0x000805, playerCore: 0x00ff00, fxAccent: 0xffff00, interface: 0x00234f, hostile: 0xff0000 }
					];
					const idx = Math.floor((this.currentLevel - 1) / 5) % palettes.length;
					return palettes[idx];
				}
			};
		</script>

		<script src="../../assets/js/fp-sdk.js" onerror="console.info('[FreshPlay] Local environment detected. Using fallback SDK.')"></script>
		<script src="game.js"></script>

		<script>
			window.addEventListener('load', () => {
				setTimeout(() => {
					const ls = document.getElementById('loading-screen');
					if (ls) ls.classList.add('hidden');
					setTimeout(() => { if (ls) ls.remove(); }, 600);
				}, 800);
			});
		</script>
	</body>
</html>
