<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <!--
    CRITICAL mobile fix: maximum-scale=1 + viewport-fit=cover
    user-scalable=no prevents the double-tap zoom that fires phantom clicks
  -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable"                    content="yes" />
  <meta name="apple-mobile-web-app-capable"              content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style"     content="black-translucent" />
  <meta name="theme-color"                               content="#0a0e1a" />
  <meta name="description"
        content="Clicker Miner — tap the Data Core, mine digital currency, build a bot army." />
  <title>Clicker Miner</title>

  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg    : #0a0e1a;
      --core  : #00e5ff;
      --accent: #ff6b35;
      --glass : rgba(13, 17, 23, 0.92);
      --mono  : 'Courier New', 'Lucida Console', monospace;
    }

    html {
      height: 100%;
      /* Respect iOS notch / home-bar */
      padding: env(safe-area-inset-top)   env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    body {
      width   : 100%;
      height  : 100%;
      overflow: hidden;
      background: var(--bg);
      font-family   : var(--mono);
      color         : var(--core);
      overscroll-behavior : none;
      /*
        FIX: DO NOT set touch-action: none on body.
        That suppresses Phaser's pointer events on Android Chrome.
        Phaser itself handles this on the canvas.
      */
    }

    /* Kill tap highlights on every element */
    * { -webkit-tap-highlight-color: transparent; }

    /* ── Game container ─────────────────────────────────────────────── */
    #game-container {
      position: absolute;
      top : 0; left: 0; right: 0; bottom: 0;
    }

    /*
      CRITICAL FIX:
      Do NOT override canvas width/height with CSS percentages.
      Phaser's RESIZE scale mode sets the canvas pixel dimensions to match
      the container. Forcing 100% via CSS breaks the coordinate system
      (pointer events land at wrong positions, especially on mobile).
      We only set display:block to remove the inline baseline gap.
    */
    #game-container canvas {
      display : block;
      outline : none;
      /* touch-action on the canvas only — safe here */
      touch-action: none;
    }

    /* ── Loading screen ─────────────────────────────────────────────── */
    #loader {
      position       : fixed;
      inset          : 0;
      z-index        : 9999;
      display        : flex;
      flex-direction : column;
      align-items    : center;
      justify-content: center;
      gap            : 28px;
      background: var(--bg);
      transition     : opacity 0.55s ease, visibility 0.55s ease;
    }
    #loader.hidden {
      opacity       : 0;
      visibility    : hidden;
      pointer-events: none;
    }

    /* Hex logo */
    .hex-logo {
      width    : clamp(72px, 20vmin, 112px);
      height   : clamp(72px, 20vmin, 112px);
      animation: hexSpin 3.5s linear infinite;
    }
    @keyframes hexSpin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

    .hex-logo .hex-glow   { fill:none; stroke:var(--core); stroke-width:1.4; opacity:0.18; animation:hexPulse 1.8s ease-in-out infinite alternate; }
    .hex-logo .hex-body   { fill:none; stroke:var(--core); stroke-width:1.6; }
    .hex-logo .hex-inner  { fill:none; stroke:var(--core); stroke-width:0.8; opacity:0.4; }
    .hex-logo .hex-dot    { fill:var(--core); }
    .hex-logo .hex-spoke  { stroke:var(--core); stroke-width:0.7; opacity:0.3; }
    @keyframes hexPulse { from { opacity:0.12; } to { opacity:0.35; } }

    .loader-title {
      font-size     : clamp(18px, 5vmin, 28px);
      letter-spacing: 0.28em;
      color         : var(--core);
      text-shadow   : 0 0 18px rgba(0,212,255,0.55);
    }
    .loader-sub {
      font-size     : clamp(10px, 2.8vmin, 14px);
      letter-spacing: 0.18em;
      color         : #2a4466;
      animation     : blink 1.1s ease-in-out infinite alternate;
    }
    @keyframes blink { from { opacity:0.4; } to { opacity:1; } }

    .loader-bar-track {
      width        : clamp(160px, 44vw, 260px);
      height       : 2px;
      background: #c4e2f5;
      border-radius: 2px;
      overflow     : hidden;
    }
    .loader-bar-fill {
      height    : 100%;
      width     : 0%;
      background: linear-gradient(90deg, var(--core), var(--accent));
      animation : loadFill 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes loadFill { 0%{width:0%} 60%{width:75%} 100%{width:100%} }

    /* ── iOS "Add to Home Screen" nudge ─────────────────────────────── */
    #a2hs-nudge {
      display       : none;
      position      : fixed;
      bottom        : calc(20px + env(safe-area-inset-bottom));
      left          : 50%;
      transform     : translateX(-50%);
      z-index       : 8000;
      padding       : 10px 18px;
      background    : var(--glass);
      border        : 1px solid rgba(0,212,255,0.20);
      border-radius : 8px;
      font-size     : 11px;
      color         : #667799;
      white-space   : nowrap;
      letter-spacing: 0.06em;
      pointer-events: none;
      animation     : a2hsFade 0.5s ease forwards, a2hsFadeOut 0.5s ease 4.5s forwards;
    }
    @keyframes a2hsFade    { from{opacity:0;transform:translateX(-50%) translateY(12px);}  to{opacity:1;transform:translateX(-50%) translateY(0);} }
    @keyframes a2hsFadeOut { from{opacity:1;} to{opacity:0;} }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loader" role="status" aria-label="Loading Clicker Miner">
    <svg class="hex-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle class="hex-glow" cx="50" cy="50" r="46"/>
      <polygon class="hex-body"  points="50,8 85.6,29 85.6,71 50,92 14.4,71 14.4,29"/>
      <polygon class="hex-inner" points="50,22 73.4,35.5 73.4,64.5 50,78 26.6,64.5 26.6,35.5"/>
      <line class="hex-spoke" x1="50"   y1="8"   x2="50"   y2="22"/>
      <line class="hex-spoke" x1="85.6" y1="29"  x2="73.4" y2="35.5"/>
      <line class="hex-spoke" x1="85.6" y1="71"  x2="73.4" y2="64.5"/>
      <line class="hex-spoke" x1="50"   y1="92"  x2="50"   y2="78"/>
      <line class="hex-spoke" x1="14.4" y1="71"  x2="26.6" y2="64.5"/>
      <line class="hex-spoke" x1="14.4" y1="29"  x2="26.6" y2="35.5"/>
      <circle class="hex-dot" cx="50" cy="50" r="4"/>
    </svg>
    <div class="loader-title">CLICKER MINER</div>
    <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
    <div class="loader-sub">INITIALIZING DATA CORE…</div>
  </div>

  <!-- Phaser canvas host -->
  <div id="game-container"></div>

  <!-- iOS A2HS nudge -->
  <div id="a2hs-nudge">⬆ Add to Home Screen for full-screen play</div>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--  FRESHPLAY SDK STUB  (replace with real SDK in production)         -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';
    const PALETTES = [
      { background: '#f0f4f8', playerCore: '#00e5ff', fxAccent:'#ff6b35', interface: '#1e293b' },
      { background: '#f0f4f8', playerCore: '#00e5ff', fxAccent:'#ffdd00', interface: '#1e293b' },
      { background: '#f0f4f8', playerCore: '#00e5ff', fxAccent:'#ff3366', interface: '#1e293b' },
      { background: '#f0f4f8', playerCore: '#00e5ff', fxAccent:'#00aaff', interface: '#1e293b' },
      { background: '#f0f4f8', playerCore:'#4488ff', fxAccent:'#ff4499', interface: '#1e293b' },
      { background: '#f0f4f8', playerCore: '#00e5ff', fxAccent:'#44ffdd', interface: '#1e293b' },
    ];
    let _level = 0, _adActive = false;
    window.FreshPlay = {
      getCurrentPalette() { return { ...PALETTES[_level % PALETTES.length] }; },
      levelComplete(callback) {
        if (_adActive) return;
        _adActive = true; _level++;
        console.info(`[FreshPlay] level ${_level} | ${PALETTES[_level % PALETTES.length].playerCore}`);
        setTimeout(() => { _adActive = false; if (typeof callback === 'function') callback(); }, 1200);
      },
      trackEvent(name, data) { console.debug('[FreshPlay]', name, data); },
    };
    console.info('[FreshPlay] Dev stub active.');
  })();
  </script>

  <!-- Phaser 3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

  <!-- Game -->
  <script src="game.js"></script>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!--  BOOTSTRAP GLUE                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    // Hide loader once Phaser injects its canvas
    function hideLoader() {
      const loader = document.getElementById('loader');
      if (!loader || loader.classList.contains('hidden')) return;
      loader.classList.add('hidden');
      loader.addEventListener('transitionend', () => loader.remove(), { once:true });
    }

    const observer = new MutationObserver(() => {
      if (document.querySelector('#game-container canvas')) {
        observer.disconnect();
        setTimeout(hideLoader, 380);
      }
    });
    const container = document.getElementById('game-container');
    if (container) observer.observe(container, { childList:true });
    setTimeout(hideLoader, 5000); // hard fallback

    // Prevent context menu on long-press
    document.addEventListener('contextmenu', e => e.preventDefault());

    /*
      FIX: only suppress scrolling on the canvas itself, not the whole document.
      Blocking touchmove on the document prevents Phaser's pointer handling on
      some Android browsers.
    */
    document.addEventListener('touchmove', e => {
      if (e.target && e.target.tagName === 'CANVAS') e.preventDefault();
    }, { passive: false });

    // iOS A2HS nudge (shown once per session)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSA  = window.navigator.standalone === true;
    if (isIOS && !isSA && !sessionStorage.getItem('cm_a2hs')) {
      sessionStorage.setItem('cm_a2hs', '1');
      const nudge = document.getElementById('a2hs-nudge');
      if (nudge) { nudge.style.display = 'block'; setTimeout(() => nudge.remove(), 5500); }
    }

    // Global error logging
    window.addEventListener('error', evt => console.error('[ClickerMiner]', evt.message));
    window.addEventListener('unhandledrejection', evt => console.error('[ClickerMiner]', evt.reason));
  })();
  </script>

</body>
</html>
