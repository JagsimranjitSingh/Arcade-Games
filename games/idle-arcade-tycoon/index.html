<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Idle Arcade Tycoon</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box
			}

			html,
			body {
				width: 100%;
				height: 100%;
				background: #000;
				overflow: hidden;
				font-family: 'Courier New', monospace
			}

			#game-container {
				width: 100%;
				height: 100%;
				display: flex;
				align-items: center;
				justify-content: center
			}

			canvas {
				display: block;
				image-rendering: auto
			}

			/* Level-Up Overlay (DOM layer, above canvas) */
			#lvlup-overlay {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				z-index: 9999;
				pointer-events: none;
			}

			#lvlup-overlay.show {
				display: flex;
			}

			#lvlup-card {
				background: rgba(10, 10, 26, .96);
				border: 2px solid var(--core, #00ffe7);
				border-radius: 4px;
				padding: 40px 60px;
				text-align: center;
				box-shadow: 0 0 80px var(--core, #00ffe7), 0 0 160px rgba(0, 0, 0, .8);
				transform: scale(.7);
				opacity: 0;
				transition: transform .45s cubic-bezier(.34, 1.56, .64, 1), opacity .35s ease;
			}

			#lvlup-overlay.show #lvlup-card {
				transform: scale(1);
				opacity: 1;
			}

			#lvlup-card h1 {
				font-size: 48px;
				letter-spacing: 8px;
				color: var(--fx, #ff00aa);
				text-shadow: 0 0 20px var(--fx, #ff00aa);
			}

			#lvlup-card h2 {
				font-size: 20px;
				letter-spacing: 4px;
				color: var(--core, #00ffe7);
				margin-top: 8px;
			}

			#lvlup-card p {
				font-size: 13px;
				color: #aaa;
				margin-top: 16px;
				letter-spacing: 2px;
			}

			.stars {
				font-size: 32px;
				letter-spacing: 6px;
				animation: starPop .6s ease forwards;
			}

			@keyframes starPop {
				0% {
					transform: scale(0);
					opacity: 0
				}

				60% {
					transform: scale(1.3)
				}

				100% {
					transform: scale(1);
					opacity: 1
				}
			}

			/* Save/Load toast */
			#toast {
				position: fixed;
				bottom: 80px;
				left: 50%;
				transform: translateX(-50%) translateY(60px);
				background: rgba(10, 10, 26, .95);
				border: 1px solid #00ffe7;
				padding: 10px 24px;
				color: #00ffe7;
				font-size: 12px;
				letter-spacing: 2px;
				border-radius: 2px;
				opacity: 0;
				transition: all .3s ease;
				pointer-events: none;
				z-index: 10000;
			}

			#toast.show {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
		</style>
	</head>

	<body>
		<div id="game-container"></div>

		<div id="lvlup-overlay">
			<div id="lvlup-card">
				<div class="stars" id="lvlup-stars">★ ★ ★</div>
				<h1 id="lvlup-num">LEVEL 2</h1>
				<h2 id="lvlup-sub">MILESTONE CLEARED</h2>
				<p id="lvlup-detail">New palette unlocked · Upgrades now cost more</p>
			</div>
		</div>
		<div id="toast" id="toast">GAME SAVED</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
		<script src="game.js"></script>
	</body>
</html>
