<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Idle Arcade Tycoon</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				-webkit-tap-highlight-color: transparent;
			}

			html {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #c4e2f5;
			}

			body {
				width: 100%;
				height: 100%;
				background: #c4e2f5;
				overflow: hidden;
				font-family: 'Courier New', monospace;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				touch-action: none;
				-webkit-overflow-scrolling: none;
				overscroll-behavior: none;
			}

			#game-container {
				width: 100%;
				height: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			canvas {
				display: block;
				image-rendering: auto;
				max-width: 100%;
				max-height: 100%;
			}

			/* ── Rotate-to-landscape overlay ── */
			#rotate-overlay {
				display: none;
				position: fixed;
				inset: 0;
				background: #0a0a1a;
				z-index: 99999;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				gap: 24px;
			}

			#rotate-overlay.show {
				display: flex;
			}

			#rotate-overlay .rotate-icon {
				font-size: 64px;
				animation: rotateHint 1.8s ease-in-out infinite;
			}

			#rotate-overlay p {
				color: #00ffe7;
				font-family: 'Courier New', monospace;
				font-size: 16px;
				letter-spacing: 3px;
				text-align: center;
				padding: 0 24px;
				text-shadow: 0 0 12px #00ffe7;
			}

			#rotate-overlay .sub {
				color: #555;
				font-size: 11px;
				letter-spacing: 2px;
			}

			@keyframes rotateHint {
				0%, 100% { transform: rotate(0deg); }
				40% { transform: rotate(90deg); }
				60% { transform: rotate(90deg); }
			}

			/* Level-Up Overlay (DOM layer, above canvas) */
			#lvlup-overlay {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				flex-direction: column;
				z-index: 9999;
				pointer-events: none;
			}

			#lvlup-overlay.show {
				display: flex;
			}

			#lvlup-card {
				background: rgba(10, 10, 26, .96);
				border: 2px solid var(--core, #00ffe7);
				border-radius: 4px;
				padding: 40px 60px;
				text-align: center;
				box-shadow: 0 0 80px var(--core, #00ffe7), 0 0 160px rgba(0, 0, 0, .8);
				transform: scale(.7);
				opacity: 0;
				transition: transform .45s cubic-bezier(.34, 1.56, .64, 1), opacity .35s ease;
			}

			#lvlup-overlay.show #lvlup-card {
				transform: scale(1);
				opacity: 1;
			}

			#lvlup-card h1 {
				font-size: 48px;
				letter-spacing: 8px;
				color: var(--fx, #ff00aa);
				text-shadow: 0 0 20px var(--fx, #ff00aa);
			}

			#lvlup-card h2 {
				font-size: 20px;
				letter-spacing: 4px;
				color: var(--core, #00ffe7);
				margin-top: 8px;
			}

			#lvlup-card p {
				font-size: 13px;
				color: #aaa;
				margin-top: 16px;
				letter-spacing: 2px;
			}

			.stars {
				font-size: 32px;
				letter-spacing: 6px;
				animation: starPop .6s ease forwards;
			}

			@keyframes starPop {
				0% {
					transform: scale(0);
					opacity: 0
				}

				60% {
					transform: scale(1.3)
				}

				100% {
					transform: scale(1);
					opacity: 1
				}
			}

			/* Save/Load toast */
			#toast {
				position: fixed;
				bottom: 80px;
				left: 50%;
				transform: translateX(-50%) translateY(60px);
				background: rgba(10, 10, 26, .95);
				border: 1px solid #00ffe7;
				padding: 10px 24px;
				color: #00ffe7;
				font-size: 12px;
				letter-spacing: 2px;
				border-radius: 2px;
				opacity: 0;
				transition: all .3s ease;
				pointer-events: none;
				z-index: 10000;
			}

			#toast.show {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}
		</style>
	</head>

	<body>
		<!-- Rotate-to-landscape blocker -->
		<div id="rotate-overlay">
			<div class="rotate-icon">📱</div>
			<p>ROTATE DEVICE TO PLAY</p>
			<p class="sub">IDLE ARCADE TYCOON · LANDSCAPE ONLY</p>
		</div>

		<div id="game-container"></div>

		<div id="lvlup-overlay">
			<div id="lvlup-card">
				<div class="stars" id="lvlup-stars">★ ★ ★</div>
				<h1 id="lvlup-num">LEVEL 2</h1>
				<h2 id="lvlup-sub">MILESTONE CLEARED</h2>
				<p id="lvlup-detail">New palette unlocked · Upgrades now cost more</p>
			</div>
		</div>
		<div id="toast" id="toast">GAME SAVED</div>

		<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
		<script src="game.js"></script>
		<script>
			(function () {
				var overlay = document.getElementById('rotate-overlay');

				function checkOrientation() {
					var isPortrait = window.innerHeight > window.innerWidth;
					if (screen.orientation && screen.orientation.type) {
						isPortrait = screen.orientation.type.indexOf('portrait') !== -1;
					}
					if (isPortrait) {
						overlay.classList.add('show');
						if (window._iat && window._iat.scene) {
							window._iat.scene.scenes.forEach(function (s) {
								if (s.sys.isActive && s.sys.isActive()) s.sys.pause();
							});
						}
					} else {
						overlay.classList.remove('show');
						if (window._iat && window._iat.scene) {
							window._iat.scene.scenes.forEach(function (s) {
								if (s.sys.isPaused && s.sys.isPaused()) s.sys.resume();
							});
						}
					}
				}

				window.addEventListener('resize', checkOrientation);
				window.addEventListener('orientationchange', checkOrientation);
				window.addEventListener('orientationchange', function () {
					setTimeout(checkOrientation, 350);
				});
				checkOrientation();
			})();
		</script>
	</body>
</html>
